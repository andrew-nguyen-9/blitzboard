<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" font-family="ui-sans-serif,system-ui,Arial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0B0D"/><stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8CFF5A"/><stop offset="1" stop-color="#33D17A"/>
    </linearGradient>
    <style>
      .panel{fill:#161A21;stroke:#272D38;stroke-width:1;rx:12}
      .h{fill:#8CFF5A;font-size:13px;font-weight:700;letter-spacing:1px}
      .t{fill:#E7EAF0;font-size:13px} .s{fill:#8A93A6;font-size:11px}
      .lbl{fill:#5C6373;font-size:11px;letter-spacing:2px;font-weight:700}
      .flow{stroke:#3A4150;stroke-width:1.5;fill:none}
      .flowA{stroke:url(#acc);stroke-width:2;fill:none}
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3A4150"/></marker>
    <marker id="arrA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#33D17A"/></marker>
  </defs>
  <rect width="1100" height="640" fill="url(#bg)"/>
  <text x="40" y="44" fill="#fff" font-size="22" font-weight="800">Fantasy Football Draft Tool — System Architecture</text>
  <text x="40" y="66" class="s">Pipeline computes; Supabase stores; frontend reads (anon, read-only). 7 tools all consume one value + trending layer.</text>

  <!-- columns -->
  <text x="60"  y="108" class="lbl">SOURCES</text>
  <text x="320" y="108" class="lbl">PIPELINE · Python / GitHub Actions cron</text>
  <text x="700" y="108" class="lbl">SUPABASE · Postgres</text>
  <text x="940" y="108" class="lbl">FRONTEND</text>

  <!-- sources -->
  <g>
    <rect class="panel" x="40" y="130" width="190" height="34" rx="10"/><text x="52" y="152" class="t">Sleeper API</text><text x="200" y="152" class="s">free</text>
    <rect class="panel" x="40" y="178" width="190" height="34" rx="10"/><text x="52" y="200" class="t">nflverse / nfl_data_py</text>
    <rect class="panel" x="40" y="226" width="190" height="34" rx="10"/><text x="52" y="248" class="t">ESPN Fantasy</text><text x="186" y="248" fill="#E0A33A" font-size="10">fragile</text>
    <rect class="panel" x="40" y="290" width="190" height="34" rx="10"/><text x="52" y="312" class="t">RSS feeds</text>
    <rect class="panel" x="40" y="338" width="190" height="34" rx="10"/><text x="52" y="360" class="t">Reddit (r/ff)</text>
    <text x="40" y="398" class="s">waiver-window cron · 30m · 8a–1a</text>
  </g>

  <!-- pipeline -->
  <g>
    <rect class="panel" x="290" y="130" width="200" height="48" rx="10"/><text x="304" y="152" class="t">player_ingest</text><text x="304" y="168" class="s">→ players, trending_raw</text>
    <rect class="panel" x="290" y="190" width="200" height="48" rx="10"/><text x="304" y="212" class="t">history_ingest</text><text x="304" y="228" class="s">→ stats_history</text>
    <rect class="panel" x="290" y="250" width="200" height="48" rx="10"/><text x="304" y="272" class="t">league_sync (ESPN)</text><text x="304" y="288" class="s">→ leagues, rules, rosters</text>
    <rect class="panel" x="290" y="316" width="200" height="48" rx="10"/><text x="304" y="338" class="t">news_sentiment</text><text x="304" y="354" class="s">VADER→FinBERT · → news, trending</text>

    <rect class="panel" x="510" y="150" width="160" height="40" rx="10" stroke="#33D17A"/><text x="524" y="170" class="h">Projector</text><text x="524" y="185" class="s">dist: μ,floor,ceil,σ</text>
    <rect class="panel" x="510" y="210" width="160" height="56" rx="10" stroke="#33D17A"/><text x="524" y="230" class="h">ValueEngine</text><text x="524" y="246" class="s">VORP ⇄ MonteCarlo</text><text x="524" y="260" class="s">(toggle)</text>
  </g>

  <!-- supabase -->
  <g>
    <rect class="panel" x="700" y="130" width="180" height="220" rx="12"/>
    <text x="716" y="156" class="t">players</text>
    <text x="716" y="180" class="t">stats_history</text>
    <text x="716" y="204" class="t">projections</text>
    <text x="716" y="228" class="t" fill="#8CFF5A">player_value</text>
    <text x="716" y="252" class="t">leagues · rules · rosters</text>
    <text x="716" y="276" class="t">news_articles</text>
    <text x="716" y="300" class="t" fill="#8CFF5A">trending</text>
    <text x="716" y="324" class="t">drafts · draft_picks</text>
    <text x="716" y="344" class="s">RLS: public-read · service-role write</text>
  </g>

  <!-- frontend -->
  <g>
    <rect class="panel" x="910" y="130" width="150" height="34" rx="9"/><text x="922" y="152" class="t">Homepage</text>
    <rect class="panel" x="910" y="172" width="150" height="34" rx="9"/><text x="922" y="194" class="t">Player Explorer</text>
    <rect class="panel" x="910" y="214" width="150" height="34" rx="9"/><text x="922" y="236" class="t">Draft Board</text>
    <rect class="panel" x="910" y="256" width="150" height="34" rx="9"/><text x="922" y="278" class="t">League Overview</text>
    <rect class="panel" x="910" y="298" width="150" height="34" rx="9"/><text x="922" y="320" class="t">Waiver Tool</text>
    <rect class="panel" x="910" y="340" width="150" height="34" rx="9"/><text x="922" y="362" class="t">Trade Optimizer</text>
  </g>

  <!-- flows -->
  <path class="flow" d="M230,147 H290" marker-end="url(#arr)"/>
  <path class="flow" d="M230,195 H290" marker-end="url(#arr)"/>
  <path class="flow" d="M230,243 H290" marker-end="url(#arr)"/>
  <path class="flow" d="M230,307 H290" marker-end="url(#arr)"/>
  <path class="flow" d="M230,355 H290" marker-end="url(#arr)"/>
  <path class="flowA" d="M490,170 H510" marker-end="url(#arrA)"/>
  <path class="flowA" d="M490,232 H510" marker-end="url(#arrA)"/>
  <path class="flowA" d="M670,238 C690,238 690,228 700,228" marker-end="url(#arrA)"/>
  <path class="flow" d="M490,340 C600,340 610,300 700,300" marker-end="url(#arr)"/>
  <path class="flowA" d="M880,240 H910" marker-end="url(#arrA)"/>
  <path class="flow" d="M880,300 H910" marker-end="url(#arr)"/>

  <!-- legend -->
  <rect x="40" y="470" width="1020" height="130" rx="12" class="panel"/>
  <text x="60" y="498" class="h">CORE ABSTRACTIONS</text>
  <text x="60"  y="524" class="t">LeagueRules <tspan class="s">— JSONB scoring + roster; single source of truth</tspan></text>
  <text x="60"  y="548" class="t">Projector <tspan class="s">— emits distributions (so Monte Carlo isn't blocked)</tspan></text>
  <text x="560" y="524" class="t">ValueEngine <tspan class="s">— VORP | MonteCarlo, precomputed &amp; cached; UI toggles</tspan></text>
  <text x="560" y="548" class="t">SentimentScorer <tspan class="s">— VADER now, FinBERT later, same interface</tspan></text>
  <text x="60"  y="578" class="t">PickSource <tspan class="s">— EspnLive | SleeperLive | Manual (universal fallback)</tspan></text>
</svg>
