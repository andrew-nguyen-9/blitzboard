name: ETL — daily player & history refresh

# Daily player universe + (offseason) history refresh. The waiver-window
# sentiment cron (P4) is a SEPARATE workflow with its own conditional schedule.
on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC daily (~6am CT)
  workflow_dispatch:
    inputs:
      seasons:
        description: "Seasons for history_ingest (space-separated)"
        required: false
        default: "2022 2023 2024"

jobs:
  etl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r requirements.txt

      - name: Ingest player universe (Sleeper)
        run: python player_ingest.py --trending

      # History scope: on manual dispatch run exactly the requested seasons (no
      # skip). On the daily cron, request 2022..latest-completed-season and let
      # the marker skip the run when nothing's new — a freshly-started season
      # makes `seasons` change, missing the cache, which IS the "new season
      # detected" trigger. ponytail: month>=9 ⇒ that year is the latest season.
      - name: Determine history scope
        id: hist
        env:
          EVENT: ${{ github.event_name }}
          # Untrusted dispatch input — keep in env, sanitize to digits/spaces.
          REQUESTED: ${{ github.event.inputs.seasons }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            seasons=$(echo "${REQUESTED:-2022 2023 2024}" | tr -cd '0-9 ' | tr -s ' ' | sed 's/^ //;s/ $//')
            echo "seasons=${seasons:-2022 2023 2024}" >> "$GITHUB_OUTPUT"
            echo "skip=" >> "$GITHUB_OUTPUT"
          else
            y=$(date -u +%Y); [ "$(date -u +%-m)" -ge 9 ] || y=$((y - 1))
            echo "seasons=$(seq 2022 "$y" | tr '\n' ' ' | sed 's/ $//')" >> "$GITHUB_OUTPUT"
            echo "skip=--skip-if-cached" >> "$GITHUB_OUTPUT"
          fi

      # Persist the ingested-seasons marker across runs. Key is the season list,
      # so a new season ⇒ new key ⇒ cache miss ⇒ history actually re-ingests.
      - name: Cache nflverse history marker
        uses: actions/cache@v4
        with:
          path: pipeline/.nflverse_cache
          key: nflverse-history-${{ steps.hist.outputs.seasons }}

      - name: Ingest historical stats (nflverse)
        run: python history_ingest.py --seasons ${{ steps.hist.outputs.seasons }} ${{ steps.hist.outputs.skip }}

      # E3/backtest: environmental + team-context ingest for the projection
      # factors. Keyless (Open-Meteo) and degrade-safe — a network/data outage
      # emits a neutral report and never fails the pipeline, so this step is
      # idempotent and safe to run unattended before projections.
      - name: Ingest environmental/team context (E3/backtest)
        continue-on-error: true
        run: python -m ingest.context_ingest --season "$(date -u +%Y)"

      # E6/news: refresh the news feed from free RSS + keyless Reddit (.rss) and
      # recompute the trending signal. All sources are keyless; the richer praw
      # Reddit path only joins when REDDIT_CLIENT_ID/SECRET are set. Degrade-safe
      # with stale-fallback (a down source reuses its last-good batch), so it is
      # idempotent and never fails the pipeline — hence continue-on-error.
      - name: Refresh news feed + trending (E6/news)
        continue-on-error: true
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python news_sentiment.py

      - name: Compute projections + player values (VORP, superflex-aware)
        run: python value_engine_run.py --engine vorp

      - name: Compute player values (Monte Carlo, percentile-based)
        run: python value_engine_run.py --engine monte_carlo

      - name: Publish CDN player snapshots + manifest (v2.3)
        run: python publish_snapshot.py --engines vorp monte_carlo
